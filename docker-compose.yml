services:
  app:
    build: .
    container_name: habity-app
    environment:
      DATABASE_URL: postgres://habity:habity@db:5432/habity
      UPLOAD_DIR: /app/uploads
      PORT: 3560
    ports:
      - "3560:3560"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: habity-db
    environment:
      POSTGRES_DB: habity
      POSTGRES_USER: habity
      POSTGRES_PASSWORD: habity
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habity -d habity"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  uploads-data:
